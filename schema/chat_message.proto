syntax = "proto3";

package chat;

// Optimize for LITE_RUNTIME to reduce generated code size and memory footprint on mobile devices
// by removing reflection and descriptor support.
option optimize_for = LITE_RUNTIME;

// Optimized message format for low-bandwidth Bluetooth communication
message ChatMessage {
  uint64 timestamp = 1;      // Unix timestamp in milliseconds
  string sender_id = 2;      // Unique identifier for the sender
  string sender_name = 3;    // Display name of the sender
  string text = 4;           // The message content

  enum MessageType {
    TEXT = 0;
    IMAGE_METADATA = 1;
    SYSTEM = 2;
    HEARTBEAT = 3;           // Minimal payload for connection maintenance
  }
  MessageType type = 5;      // Message category for efficient routing

  // Security fields for message integrity and replay protection
  uint64 nonce = 6;              // Unique number to prevent replay attacks
  bytes authentication_tag = 7;  // Message Authentication Code (MAC) for integrity
}

// Optimized batching for high-latency connections
message MessageBatch {
  repeated ChatMessage messages = 1;
}
