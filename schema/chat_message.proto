syntax = "proto3";

package chat;

// Optimize for LITE_RUNTIME to reduce generated code size and memory footprint on mobile devices
// by removing reflection and descriptor support.
option optimize_for = LITE_RUNTIME;

// Enable arena allocation for C++ to reduce memory fragmentation and allocation overhead
// during serialization and deserialization of high-frequency chat messages.
option cc_enable_arenas = true;

// Optimized message format for low-bandwidth Bluetooth communication
message ChatMessage {
  // Reordered fields by tag number to optimize parsing efficiency in Protobuf runtimes
  uint64 timestamp = 1;      // Unix timestamp in milliseconds
  string sender_id = 2;      // Unique identifier for the sender
  string sender_name = 3;    // Display name of the sender
  string text = 4;           // The message content
  MessageType type = 5;      // Message category for efficient routing
  uint64 nonce = 6 [deprecated = true]; // Legacy nonce field (deprecated for wire compatibility)
  bytes authentication_tag = 7;  // Message Authentication Code (MAC) for integrity
  uint32 protocol_version = 8; // Version of the messaging protocol to handle upgrades and security
  string recipient_id = 9;     // Unique identifier for the intended recipient
  bytes secure_nonce = 10;     // Cryptographically secure random nonce (96+ bits)
  uint64 nonce = 6 [deprecated = true]; // Deprecated: Use secure_nonce (tag 10) for robust replay protection
  bytes authentication_tag = 7;         // Message Authentication Code (MAC) for integrity
  uint32 protocol_version = 8;          // Version of the messaging protocol to handle upgrades and security
  string recipient_id = 9;              // Unique identifier for the intended recipient to prevent reflection attacks
  bytes secure_nonce = 10;              // Cryptographically robust nonce to prevent replay attacks

  enum MessageType {
    TEXT = 0;
    IMAGE_METADATA = 1;
    SYSTEM = 2;
    HEARTBEAT = 3;           // Minimal payload for connection maintenance
  }
}

// Optimized batching for high-latency connections
message MessageBatch {
  repeated ChatMessage messages = 1;
}
